<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Zuhro.ai | AI Dashboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .ai-btn { background: #8b5cf6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Добавить товар с AI</h2>
        <input type="text" id="name" placeholder="Название товара">
        <textarea id="desc" placeholder="Описание товара..."></textarea>
        <button onclick="generateAI()">✨ Помощь AI</button>
        <button onclick="add()">Добавить</button>
        <table id="table">
            <thead><tr><th>Товар</th><th>Описание</th><th>Действие</th></tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>
    <script>
        function generateAI() {
            const name = document.getElementById('name').value;
            if(!name) return alert('Введите название для генерации!');
            document.getElementById('desc').value = `Умное описание для ${name}: высококачественный товар, проверен нейросетью Zuhro.ai. Идеально подходит для вашего стиля!`;
        }
        function add() {
            const n = document.getElementById('name'), d = document.getElementById('desc'), l = document.getElementById('list');
            if(!n.value || !d.value) return alert('Заполните все поля!');
            const row = l.insertRow();
            row.innerHTML = `<td>${n.value}</td><td>${d.value}</td><td><button onclick="this.parentElement.parentElement.remove()">Удалить</button></td>`;
            n.value = ''; d.value = '';
        }
    </script>
</body>
</html>
