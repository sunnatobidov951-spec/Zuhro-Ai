<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Zuhro.ai | Professional Dashboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: #334155; padding: 15px; border-radius: 8px; flex: 1; text-align: center; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .ai-btn { background: #8b5cf6; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>
    <div class="stats">
        <div class="stat-box">Товаров: <span id="count">0</span></div>
        <div class="stat-box">Сумма: <span id="total-price">0</span> $</div>
    </div>
    <div class="card">
        <h2>Добавление товара</h2>
        <input type="text" id="name" placeholder="Название товара">
        <input type="number" id="price" placeholder="Цена ($)">
        <textarea id="desc" placeholder="Описание товара..."></textarea>
        <button class="ai-btn" onclick="generateAI()">✨ Помощь AI</button>
        <button onclick="add()">Добавить</button>
    </div>
    <div class="card">
        <table id="table">
            <thead><tr><th>Товар</th><th>Цена</th><th>Описание</th><th>Действие</th></tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>
    <script>
        let count = 0;
        let sum = 0;
        function add() {
            const n = document.getElementById('name'), p = document.getElementById('price'), d = document.getElementById('desc'), l = document.getElementById('list');
            if(!n.value || !p.value || !d.value) return alert('Заполните все поля!');
            const price = parseFloat(p.value);
            count++; sum += price;
            document.getElementById('count').innerText = count;
            document.getElementById('total-price').innerText = sum;
            const row = l.insertRow();
            row.innerHTML = `<td>${n.value}</td><td>${price} $</td><td>${d.value}</td><td><button onclick="removeRow(this, ${price})">Удалить</button></td>`;
            n.value = ''; p.value = ''; d.value = '';
        }
        function removeRow(btn, price) {
            btn.parentElement.parentElement.remove();
            count--; sum -= price;
            document.getElementById('count').innerText = count;
            document.getElementById('total-price').innerText = sum;
        }
        function generateAI() {
            const name = document.getElementById('name').value;
            if(!name) return alert('Введите название!');
            document.getElementById('desc').value = `Профессиональный товар: ${name}. Высокое качество, проверено системой Zuhro.ai. Рекомендуем к покупке!`;
        }
    </script>
</body>
</html>
