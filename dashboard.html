<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Zuhro.ai | Global Marketplace</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        h2 { margin-top: 0; color: var(--accent); }
        input, textarea { width: 100%; margin: 10px 0; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--accent); border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .ai-btn { background: #8b5cf6; }
        /* Профессиональная сетка карточек */
        #catalog-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; transition: 0.3s; }
        .product-card:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="card">
    <h2>Zuhro.ai | Панель управления</h2>
    <input type="text" id="name" placeholder="Название товара">
    <input type="number" id="price" placeholder="Цена ($)">
    <textarea id="desc" placeholder="Описание товара..."></textarea>
    <button class="ai-btn" onclick="requestAI()">✨ Помощь AI</button>
    <button onclick="addToCatalog()">Добавить на витрину</button>
</div>

<div class="card">
    <h3>Витрина товаров</h3>
    <div id="catalog-list"></div>
</div>

<div class="card cart-section">
    <h3>🛒 Корзина</h3>
    <div id="cart-items">Корзина пуста</div>
    <p><strong>Итого: <span id="cart-total">0</span> $</strong></p>
</div>

<script>
    let cartTotal = 0;
    
    async function requestAI() {
        const name = document.getElementById('name').value;
        if(!name) return alert('Введите название!');
        document.getElementById('desc').value = "Анализ...";
        setTimeout(() => {
            document.getElementById('desc').value = `Эксклюзивный товар: ${name}. Высочайшее качество Zuhro.ai.`;
        }, 1000);
    }
    
    function addToCatalog() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('price').value;
        const d = document.getElementById('desc').value;
        if(!n || !p) return alert('Заполните поля!');
        
        const list = document.getElementById('catalog-list');
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `<h4>${n}</h4><p>${d}</p><p><b>${p} $</b></p><button onclick="addToCart(${p}, '${n}')">Купить</button>`;
        list.appendChild(card);
        
        document.getElementById('name').value = '';
        document.getElementById('price').value = '';
        document.getElementById('desc').value = '';
    }
    
    function addToCart(price, name) {
        cartTotal += parseFloat(price);
        document.getElementById('cart-total').innerText = cartTotal;
        const items = document.getElementById('cart-items');
        if(items.innerText === 'Корзина пуста') items.innerHTML = '';
        items.innerHTML += `<div>✅ ${name} - ${price} $</div>`;
    }
</script>

</body>
</html>
