<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель Zuhro.ai</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; }
        .sidebar { width: 250px; height: 100vh; background-color: #1a1a2e; color: white; padding: 20px; }
        .main-content { flex: 1; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a1a2e; }
        .btn-add { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Zuhro.ai</h2>
        <p>Меню</p>
        <p>Мои товары</p>
        <p>Заказы</p>
    </div>
    <div class="main-content">
        <div class="card">
            <h1>Добро пожаловать в личный кабинет!</h1>
            <p>Здесь вы сможете управлять своими продажами и автоматизировать работу с поставщиками.</p>
            <button class="btn-add">+ Добавить товар</button>
        </div>
    </div>
</body>
</html>
