<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Zuhro.ai | Autonomous Engine</title>
    <style>
        :root { --bg: #0f172a; --accent: #22c55e; --danger: #ef4444; }
        body { background: var(--bg); color: #f8fafc; font-family: sans-serif; padding: 20px; }
        .module { background: #1e293b; padding: 20px; border-radius: 12px; }
        button { background: var(--accent); border: none; padding: 10px; color: white; cursor: pointer; border-radius: 6px; margin-top: 10px; }
        .auto-btn { background: #8b5cf6; }
    </style>
</head>
<body>

<div class="module">
    <h2>Zuhro.ai | Автономный режим</h2>
    <input type="text" id="name" placeholder="Название товара">
    <input type="number" id="price" placeholder="Твоя цена ($)">
    <input type="number" id="market-price" placeholder="Цена рынка ($)">
    <br>
    <button class="auto-btn" onclick="runRobot()">🤖 Запустить Авто-Робота</button>
</div>

<div id="result" style="margin-top: 20px;"></div>

<script>
    function runRobot() {
        const name = document.getElementById('name').value;
        const price = parseFloat(document.getElementById('price').value);
        const mPrice = parseFloat(document.getElementById('market-price').value);
        const res = document.getElementById('result');

        if (price > mPrice) {
            res.innerHTML = `<p style="color:red;">⚠️ Робот: Твоя цена ${price}$ выше рыночной (${mPrice}$). Удаляю товар из витрины...</p>`;
        } else {
            res.innerHTML = `<p style="color:green;">✅ Робот: Цена ${price}$ отличная. Оптимизирую описание и публикую!</p>`;
        }
    }
</script>
</body>
</html>
