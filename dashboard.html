<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Zuhro.ai | Global Marketplace</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 20px; }
        .cart-section { border: 2px solid var(--accent); padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Витрина Zuhro.ai (Мощный Маркетплейс)</h2>
        <input type="text" id="name" placeholder="Название товара">
        <input type="number" id="price" placeholder="Цена ($)">
        <button onclick="addToCatalog()">Добавить на витрину</button>
    </div>

    <div class="card">
        <h3>Товары в продаже</h3>
        <table id="catalog">
            <thead><tr><th>Товар</th><th>Цена</th><th>Действие</th></tr></thead>
            <tbody id="catalog-list"></tbody>
        </table>
    </div>

    <div class="card cart-section">
        <h3>🛒 Корзина (Покупательский опыт)</h3>
        <div id="cart-items">Корзина пуста</div>
        <p>Итого к оплате: <span id="cart-total">0</span> $</p>
    </div>

    <script>
        let cartTotal = 0;
        function addToCatalog() {
            const n = document.getElementById('name').value;
            const p = document.getElementById('price').value;
            const list = document.getElementById('catalog-list');
            const row = list.insertRow();
            row.innerHTML = `<td>${n}</td><td>${p} $</td><td><button onclick="addToCart(${p}, '${n}')">Добавить в корзину</button></td>`;
        }
        function addToCart(price, name) {
            cartTotal += parseFloat(price);
            document.getElementById('cart-total').innerText = cartTotal;
            document.getElementById('cart-items').innerHTML += `<div>${name} - ${price} $</div>`;
        }
    </script>
</body>
</html>
