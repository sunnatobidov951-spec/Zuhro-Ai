<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель Zuhro.ai</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; }
        .sidebar { width: 250px; height: 100vh; background-color: #1a1a2e; color: white; padding: 20px; }
        .main-content { flex: 1; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        input { padding: 10px; width: 200px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Zuhro.ai</h2>
        <p>Мои товары</p>
    </div>
    <div class="main-content">
        <div class="card">
            <h1>Добавить товар</h1>
            <div class="form-group">
                <input type="text" id="name" placeholder="Название товара">
                <input type="text" id="price" placeholder="Цена ($)">
                <button onclick="addProduct()">Добавить</button>
            </div>
            <table id="productTable">
                <tr><th>Название</th><th>Цена</th></tr>
            </table>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
