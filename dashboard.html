<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель Zuhro.ai</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; }
        .sidebar { width: 250px; height: 100vh; background-color: #1a1a2e; color: white; padding: 20px; }
        .main-content { flex: 1; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a1a2e; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Zuhro.ai</h2>
        <p>Меню</p>
        <p>Мои товары</p>
        <p>Заказы</p>
    </div>
    <div class="main-content">
        <div class="card">
            <h1>Мои товары</h1>
            <table>
                <tr>
                    <th>Название</th>
                    <th>Цена</th>
                    <th>Статус</th>
                </tr>
                <tr>
                    <td>Товар №1</td>
                    <td>100$</td>
                    <td>В наличии</td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
