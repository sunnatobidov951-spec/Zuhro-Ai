<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zuhro.AI Store</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    background: #f5f6fa;
    color: #111;
}

header {
    background: #071a3d;
    padding: 20px;
    color: white;
}

.logo {
    font-size: 30px;
    font-weight: bold;
    color: #d4af37;
}

.search {
    margin-top: 15px;
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

.banner {
    margin: 20px;
    padding: 40px;
    border-radius: 20px;
    background: linear-gradient(135deg,#071a3d,#d4af37);
    color: white;
}

.banner h1 {
    font-size: 36px;
}

.categories {
    display: flex;
    gap: 10px;
    padding: 20px;
    overflow-x: auto;
}

.category {
    background:white;
    padding:15px 25px;
    border-radius:15px;
    white-space:nowrap;
}

.products {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    border-radius:20px;
    padding:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card img {
    width:100%;
    border-radius:15px;
}

.price {
    color:#071a3d;
    font-size:22px;
    font-weight:bold;
    margin:10px 0;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#071a3d;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
<div class="logo">Zuhro.AI</div>

<input class="search" placeholder="Поиск товаров...">

</header>


<section class="banner">
<h1>Будущее покупок с AI</h1>
<p>Умный маркетплейс нового поколения</p>
</section>


<div class="categories">
<div class="category">Электроника</div>
<div class="category">Одежда</div>
<div class="category">Дом</div>
<div class="category">Красота</div>
</div>


<section class="products">

<div class="card">
<img src="https://via.placeholder.com/400">
<h3>AI Smartphone</h3>
<div class="price">$499</div>
<button>В корзину</button>
</div>


<div class="card">
<img src="https://via.placeholder.com/400">
<h3>Premium Laptop</h3>
<div class="price">$999</div>
<button>В корзину</button>
</div>


<div class="card">
<img src="https://via.placeholder.com/400">
<h3>Smart Home</h3>
<div class="price">$299</div>
<button>В корзину</button>
</div>

</section>

</body>
</html>
