<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Zuhro.ai | Магазин</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .product-card { background: #1e293b; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid #334155; }
        h1 { text-align: center; color: #22c55e; }
    </style>
</head>
<body>

<h1>Zuhro.ai | Витрина</h1>
<div id="product-display">
    <p style="text-align:center;">Ожидание товара от робота...</p>
</div>

<script>
    // Робот проверяет, есть ли новый товар
    const data = localStorage.getItem('zuhro_product');
    if (data) {
        const product = JSON.parse(data);
        document.getElementById('product-display').innerHTML = `
            <div class="product-card">
                <h3>${product.name}</h3>
                <p style="white-space: pre-line;">${product.description}</p>
                <button style="width:100%; padding:10px; background:#22c55e; border:none; color:white; border-radius:5px;">Купить сейчас</button>
            </div>
        `;
    }
</script>
</body>
</html>
