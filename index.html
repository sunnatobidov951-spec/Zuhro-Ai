<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuhro.ai - Вход в систему</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; border: none; padding: 14px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; font-weight: bold; }
        button:hover { background-color: #004494; }
        .toggle-text { text-align: center; margin-top: 15px; font-size: 14px; color: #666; cursor: pointer; }
        .toggle-text:hover { color: #0056b3; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Вход в Zuhro.ai</h2>
        <input type="email" placeholder="Ваш Email" required>
        <input type="password" placeholder="Пароль" required>
        <button onclick="alert('Данные готовы к отправке на сервер!')">Войти</button>
        <div class="toggle-text">Нет аккаунта? Зарегистрироваться</div>
    </div>

</body>
</html>
