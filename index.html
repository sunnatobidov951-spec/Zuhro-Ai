<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Zuhro.ai | Global AI Engine</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #38bdf8; background: #1e293b; color: white; }
        button { width: 100%; padding: 15px; background: #38bdf8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #results { margin-top: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #38bdf8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zuhro.ai</h1>
        <input type="text" id="urlInput" placeholder="Вставь ссылку на товар...">
        <button onclick="analyzeProduct()">Анализировать товар</button>
        <div id="results"></div>
    </div>

    <script>
        function analyzeProduct() {
            const url = document.getElementById('urlInput').value;
            const results = document.getElementById('results');
            if (!url) return;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>Товар проанализирован</h3>
                <p>Источник: ${url.substring(0, 30)}...</p>
                <p>✅ Анализ завершен: <strong>Товар ликвидный</strong></p>
                <p>💰 Рекомендованная цена: $45.00</p>
            `;
            results.prepend(card);
        }
    </script>
</body>
</html>
