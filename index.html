<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuhro.ai | Маркетплейс Будущего</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        h2 { color: #2c3e50; }
        .price { font-weight: bold; color: #e67e22; font-size: 1.2em; }
    </style>
</head>
<body>

<header>
    <h1>Zuhro.ai</h1>
    <p>Интеллектуальный выбор техники для вашего дома</p>
</header>

<div class="container">
    <h2>Категория: Умный дом</h2>
    <div class="grid" id="product-grid">
        <!-- Сюда ИИ будет подгружать товары -->
        <div class="card">
            <h3>Смарт-лампа с Wi-Fi</h3>
            <p>Управляйте освещением голосом или через смартфон. 16 миллионов цветов.</p>
            <p class="price">250 000 UZS</p>
        </div>
        <div class="card">
            <h3>Умный датчик температуры</h3>
            <p>Мониторинг климата в реальном времени с уведомлениями на телефон.</p>
            <p class="price">180 000 UZS</p>
        </div>
    </div>
</div>

</body>
</html>
